<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>奇绩怪谈AIQ | 作品集</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brandFrom: "#3b82f6",
            brandTo: "#6366f1",
            softBg: "#f8fafc"
          }
        }
      }
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/site.css">
</head>
<body class="antialiased">
  <header class="fixed inset-x-0 top-0 z-50">
    <nav data-nav class="nav-glass">
      <div class="mx-auto flex h-16 w-full max-w-6xl items-center justify-between px-4 sm:px-6 lg:px-8">
        <a href="index.html" class="inline-flex items-center gap-2 text-base font-bold tracking-tight md:text-lg"><img src="assets/avatar-kunki.jpg" alt="奇绩怪谈AIQ Logo" class="h-8 w-8 rounded-full border border-slate-200 object-cover"><span class="brand-gradient">奇绩怪谈AIQ</span></a>
        <button data-menu-btn class="rounded-lg border border-slate-300 px-3 py-1 text-sm font-medium text-slate-700 md:hidden" type="button" aria-expanded="false" aria-label="打开导航菜单">菜单</button>
        <div class="hidden items-center gap-1 text-sm md:flex">
          <a data-nav-link data-nav-key="index" class="nav-link rounded-lg px-3 py-2" href="index.html">首页</a>
          <a data-nav-link data-nav-key="blog" class="nav-link rounded-lg px-3 py-2" href="blog.html">文章</a>
          <a data-nav-link data-nav-key="knowledge" class="nav-link rounded-lg px-3 py-2" href="knowledge.html">知识库</a>
          <a data-nav-link data-nav-key="portfolio" class="nav-link rounded-lg px-3 py-2" href="portfolio.html">作品集</a>
          <a data-nav-link data-nav-key="services" class="nav-link rounded-lg px-3 py-2" href="services.html">服务</a>
          <a data-nav-link data-nav-key="about" class="nav-link rounded-lg px-3 py-2" href="about.html">关于我</a>
        </div>
      </div>
      <div data-menu-panel class="mx-auto hidden w-full max-w-6xl px-4 pb-4 sm:px-6 lg:px-8 md:hidden">
        <div class="rounded-2xl border border-slate-200 bg-white/90 p-2 shadow-sm">
          <a data-nav-link data-nav-key="index" class="nav-link block rounded-lg px-3 py-2" href="index.html">首页</a>
          <a data-nav-link data-nav-key="blog" class="nav-link block rounded-lg px-3 py-2" href="blog.html">文章</a>
          <a data-nav-link data-nav-key="knowledge" class="nav-link block rounded-lg px-3 py-2" href="knowledge.html">知识库</a>
          <a data-nav-link data-nav-key="portfolio" class="nav-link block rounded-lg px-3 py-2" href="portfolio.html">作品集</a>
          <a data-nav-link data-nav-key="services" class="nav-link block rounded-lg px-3 py-2" href="services.html">服务</a>
          <a data-nav-link data-nav-key="about" class="nav-link block rounded-lg px-3 py-2" href="about.html">关于我</a>
        </div>
      </div>
    </nav>
  </header>

  <main class="pt-24 pb-16">
    <section id="dynamic-page-content" class="mx-auto hidden max-w-6xl px-4 sm:px-6 lg:px-8"></section>
    <section class="site-static mx-auto max-w-6xl px-4 sm:px-6 lg:px-8">
      <div class="reveal rounded-3xl border border-slate-200 bg-gradient-to-br from-blue-50 via-white to-slate-50 p-8 md:p-10">
        <p class="text-sm font-semibold uppercase tracking-wide text-blue-600">Portfolio</p>
        <h1 class="mt-3 text-3xl font-extrabold text-slate-900 md:text-4xl">作品集</h1>
        <p class="mt-3 text-base leading-relaxed text-slate-600">点击卡片可直接查看在线案例预览；部分项目源文件需通过微信沟通后提供。</p>
      </div>

      <div id="portfolio-grid" class="mt-8 grid gap-6 md:grid-cols-2"></div>
    </section>
  </main>

  <footer class="border-t border-slate-200 bg-white/95">
    <div class="mx-auto w-full max-w-6xl px-4 py-8 sm:px-6 lg:px-8">
      <div class="flex flex-col gap-5 rounded-2xl border border-slate-200 bg-slate-50/70 px-4 py-5 md:flex-row md:items-center md:justify-between md:gap-8">
        <p class="text-base font-semibold text-slate-700 md:text-xl">把自己点亮，世界才会靠近。</p>
        <div class="flex flex-wrap items-center gap-3">
          <button class="platform-btn platform-btn--footer" data-qr-platform="shipinhao" type="button">视频号</button>
          <button class="platform-btn platform-btn--footer" data-qr-platform="xiaohongshu" type="button">小红书</button>
          <button class="platform-btn platform-btn--footer" data-qr-platform="gongzhonghao" type="button">公众号</button>
          <button class="platform-btn platform-btn--footer" data-qr-platform="douyin" type="button">抖音</button>
        </div>
      </div>
    </div>
    <div class="border-t border-slate-200/80">
      <div class="mx-auto flex w-full max-w-6xl flex-col items-center gap-2 px-4 py-4 text-center text-sm text-slate-600 sm:px-6 lg:px-8">
        <p>© 2026 奇绩怪谈AIQ</p>
        <p class="text-xs text-slate-500"><a data-icp-record href="https://beian.miit.gov.cn" target="_blank" rel="noopener noreferrer" class="transition hover:text-blue-600 hover:underline">工信部备案号：粤ICP备2026039646号</a></p>
      </div>
    </div>
  </footer>

  <script src="assets/data-fallback.js"></script>
  <script src="assets/site-common.js"></script>
  <script>
    (function () {
      SiteCommon.initNav({ currentKey: "portfolio" });
      SiteCommon.initQrModal({ assetPrefix: "" });
      SiteCommon.renderPageOverride({
        pageId: "portfolio",
        containerId: "dynamic-page-content",
        staticSelector: ".site-static",
        dataPath: "data/site-pages.json",
        fallbackKey: "sitePages"
      });

      var grid = document.getElementById("portfolio-grid");
      var tagColor = {
        "视频号": "bg-blue-50 text-blue-700",
        "小红书": "bg-rose-50 text-rose-700",
        "公众号": "bg-emerald-50 text-emerald-700",
        "合作项目": "bg-indigo-50 text-indigo-700",
        "产品方向": "bg-amber-50 text-amber-700"
      };
      var previewFallbackMap = {
        "xiaohongshu-learning-system": "portfolio-items/demos/xiaohongshu-card-generator-source.html",
        "gongzhonghao-ai-structure": "portfolio-items/demos/gongzhonghao-layout-source.html"
      };

      function renderCardPreview(previewUrl, coverUrl, title) {
        if (previewUrl) {
          return [
            '<div class="portfolio-preview aspect-video overflow-hidden rounded-xl border border-slate-200 bg-slate-50">',
            '  <iframe class="portfolio-preview-frame" src="' + SiteCommon.resolvePath(previewUrl, "") + '" title="' + title + ' 预览" loading="lazy" sandbox="allow-same-origin allow-scripts"></iframe>',
            "</div>"
          ].join("");
        }

        if (coverUrl) {
          return [
            '<div class="portfolio-preview aspect-video overflow-hidden rounded-xl border border-slate-200 bg-slate-50">',
            '  <img class="h-full w-full object-cover" src="' + SiteCommon.resolvePath(coverUrl, "") + '" alt="' + title + ' 封面">',
            "</div>"
          ].join("");
        }

        return [
          '<div class="portfolio-preview aspect-video rounded-xl border border-dashed border-blue-300 bg-gradient-to-br from-blue-50 to-indigo-50">',
          '  <div class="h-full w-full p-5 text-xs leading-relaxed text-slate-600">',
          "    案例封面预留区",
          "  </div>",
          "</div>"
        ].join("");
      }

      SiteCommon.fetchWithFallback("data/portfolio.json", "portfolio").then(function (items) {
        grid.innerHTML = items.map(function (item) {
          var tagCls = tagColor[item.platform] || "bg-slate-100 text-slate-700";
          var previewUrl = item.previewUrl || previewFallbackMap[item.id] || "";
          var coverUrl = item.cover || "";
          return [
            '<a target="_blank" rel="noopener" href="' + SiteCommon.resolvePath(item.url, "") + '" class="card-lift reveal rounded-2xl border border-slate-100 bg-white p-5">',
            "  " + renderCardPreview(previewUrl, coverUrl, item.title),
            '  <div class="mt-4">',
            '    <span class="tag-pill ' + tagCls + '">' + item.platform + '</span>',
            '    <h2 class="mt-3 text-lg font-semibold text-slate-900">' + item.title + '</h2>',
            '    <p class="mt-2 text-sm leading-relaxed text-slate-600">' + item.description + '</p>',
            '  </div>',
            '</a>'
          ].join("");
        }).join("");

        SiteCommon.initReveal(document);
      });

      SiteCommon.initReveal(document);
    })();
  </script>
</body>
</html>
