<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>奇绩怪谈AIQ | AI内容再利用工作流</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { brandFrom: "#3b82f6", brandTo: "#6366f1", softBg: "#f8fafc" } } } };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/site.css">
</head>
<body class="antialiased">
  <header class="fixed inset-x-0 top-0 z-50">
    <nav data-nav class="nav-glass">
      <div class="mx-auto flex h-16 w-full max-w-6xl items-center justify-between px-4 sm:px-6 lg:px-8">
        <a href="../index.html" class="inline-flex items-center gap-2 text-base font-bold tracking-tight md:text-lg"><img src="../assets/avatar-kunki.jpg" alt="奇绩怪谈AIQ Logo" class="h-8 w-8 rounded-full border border-slate-200 object-cover"><span class="brand-gradient">奇绩怪谈AIQ</span></a>
      </div>
    </nav>
  </header>

  <main class="pt-24 pb-16">
    <section class="mx-auto max-w-5xl px-4 sm:px-6 lg:px-8">
      <article class="reveal rounded-3xl border border-slate-200 bg-white p-8">
        <p class="text-sm font-semibold text-indigo-600">产品方向 · 商业化</p>
        <h1 class="mt-3 text-3xl font-extrabold text-slate-900">AI内容再利用工作流（1条内容拆成10条）</h1>
        <p class="mt-4 text-base leading-relaxed text-slate-600">把一条长文或口播稿，自动拆解成小红书卡片、公众号段落稿、视频号脚本和社群话术，解决“有内容但不会多平台分发”的痛点。</p>

        <div class="mt-6 grid gap-4 md:grid-cols-2">
          <div class="rounded-2xl border border-slate-200 bg-slate-50 p-5">
            <h2 class="text-sm font-semibold text-slate-500">可卖给谁</h2>
            <p class="mt-2 text-sm text-slate-700">知识博主、训练营主理人、做个人IP的老师、需要稳定输出的中小团队。</p>
          </div>
          <div class="rounded-2xl border border-slate-200 bg-slate-50 p-5">
            <h2 class="text-sm font-semibold text-slate-500">怎么收费</h2>
            <p class="mt-2 text-sm text-slate-700">按月订阅（基础版/专业版）+ 定制模板费 + 代运营交付费。</p>
          </div>
        </div>

        <div class="mt-6 rounded-2xl border border-blue-200 bg-blue-50 p-5">
          <h2 class="text-base font-bold text-slate-900">落地节奏（建议）</h2>
          <ol class="mt-3 list-decimal space-y-2 pl-5 text-sm leading-relaxed text-slate-700">
            <li>先做“你的个人演示版”，用你自己的内容跑通。</li>
            <li>找到3个种子客户，按单交付拿首批案例。</li>
            <li>把常用场景模板化，升级成标准化服务包。</li>
          </ol>
        </div>

        <div class="mt-6 flex flex-wrap items-center gap-3">
          <button data-qr-platform="wechat" type="button" class="inline-flex rounded-xl border border-blue-200 bg-blue-50 px-4 py-2 text-sm font-semibold text-blue-700 transition hover:bg-blue-100">我想做这个，微信细聊</button>
          <a href="../portfolio.html" class="inline-flex rounded-xl border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-700 transition hover:bg-slate-50">返回作品集</a>
        </div>
      </article>
    </section>
  </main>

  <script src="../assets/data-fallback.js"></script>
  <script src="../assets/site-common.js"></script>
  <script>
    (function () {
      SiteCommon.initNav({ currentKey: "portfolio" });
      SiteCommon.initQrModal({ assetPrefix: "../" });
      SiteCommon.initReveal(document);
    })();
  </script>
</body>
</html>
