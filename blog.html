  <main class="pt-24 pb-16">
    <section id="dynamic-page-content" class="mx-auto hidden max-w-6xl px-4 sm:px-6 lg:px-8"></section>
    <section class="site-static mx-auto max-w-6xl px-4 sm:px-6 lg:px-8">
      <div class="reveal rounded-3xl border border-slate-200 bg-gradient-to-br from-blue-50 via-white to-slate-50 p-8 md:p-10">
        <p class="text-sm font-semibold uppercase tracking-wide text-blue-600">Blog</p>
        <h1 class="mt-3 text-3xl font-extrabold text-slate-900 md:text-4xl">文章</h1>
        <p class="mt-3 text-base leading-relaxed text-slate-600">这里记录我正在做的事、正在踩的坑和正在验证的方法。点击卡片将在新标签页打开。</p>
      </div>

      <div class="reveal mt-8 flex flex-wrap gap-2" aria-label="文章分类筛选">
        <button class="filter-btn is-active" data-filter="全部" type="button">全部</button>
        <button class="filter-btn" data-filter="大学结果" type="button">大学结果</button>
        <button class="filter-btn" data-filter="AI工具" type="button">AI工具</button>
        <button class="filter-btn" data-filter="一人公司" type="button">一人公司</button>
        <button class="filter-btn" data-filter="成长实验" type="button">成长实验</button>
      </div>

      <div id="blog-tab-guide" class="reveal mt-5 rounded-2xl border border-slate-200 bg-white p-5 text-sm leading-relaxed text-slate-600"></div>

      <div class="reveal mt-5 flex flex-wrap items-center gap-3">

          搜索文章
        </button>
        <div id="blog-search-wrap" class="hidden w-full max-w-md">
          <label for="blog-search-input" class="sr-only">输入关键词搜索文章</label>
          <input id="blog-search-input" type="search" placeholder="输入关键词（标题、摘要、分类、标签）" class="w-full rounded-xl border border-slate-300 bg-white px-4 py-2 text-sm text-slate-700 outline-none transition focus:border-blue-400 focus:ring-2 focus:ring-blue-100">
        </div>
      </div>

      <div id="blog-post-list" class="mt-8 grid gap-6 md:grid-cols-2"></div>
    </section>
  </main>

          <button class="platform-btn platform-btn--footer" data-qr-platform="gongzhonghao" type="button">公众号</button>
          <button class="platform-btn platform-btn--footer" data-qr-platform="douyin" type="button">抖音</button>
        </div>

    </div>
    <div class="border-t border-slate-200/80">
      <div class="mx-auto flex w-full max-w-6xl flex-col items-center gap-2 px-4 py-4 text-center text-sm text-slate-600 sm:px-6 lg:px-8">
        <p>© 2026 奇绩怪谈AIQ</p>
        <p class="text-xs text-slate-500"><a data-icp-record href="https://beian.miit.gov.cn" target="_blank" rel="noopener noreferrer" class="transition hover:text-blue-600 hover:underline">工信部备案号：粤ICP备2026039646号</a></p>
      </div>
    </div>
  </footer>

  <script src="assets/data-fallback.js"></script>
  <script src="assets/site-common.js"></script>
  <script>
    (function () {
      SiteCommon.initNav({ currentKey: "blog" });
      SiteCommon.initQrModal({ assetPrefix: "" });
      SiteCommon.renderPageOverride({
        pageId: "blog",
        containerId: "dynamic-page-content",
        staticSelector: ".site-static",
        dataPath: "data/site-pages.json",
        fallbackKey: "sitePages"
      });

      var list = document.getElementById("blog-post-list");
      var filters = document.querySelectorAll("[data-filter]");
      var tabGuide = document.getElementById("blog-tab-guide");
      var searchToggle = document.getElementById("blog-search-toggle");
      var searchWrap = document.getElementById("blog-search-wrap");
      var searchInput = document.getElementById("blog-search-input");
      var currentFilter = "全部";
      var currentQuery = "";
      var allPosts = [];
      var tabGuideMap = {
        "全部": "你可以按主题浏览，也可以直接搜索关键词快速定位文章。",
        "大学结果": "不是大学攻略，是怎么用更少的时间和更聪明的方法，拿到你真正想要的那个结果。",
        "AI工具": "只写我真正用过的工具。不做资讯搬运，只回答三个问题：我怎么用、适合谁、能解决什么。",
        "一人公司": "一个没有团队、没有资金的大学生，怎么用AI和内容，试着跑通属于自己的小生意。",
        "成长实验": "不是鸡汤，是实验记录。我把健身、社交、自律、表达这些事当作项目来跑，然后写复盘。"
      };

      function normalizeTags(item) {
        var tags = item && item.tags;
        if (Array.isArray(tags)) return tags;
        if (typeof tags === "string") return [tags];
        return [];
      }

      function normalizeText(value) {
        return String(value || "").toLowerCase();
      }

      function matchesSearch(item) {
        if (!currentQuery) return true;
        var haystack = [
          item.title,
          item.description,
          item.category
        ].concat(normalizeTags(item)).join(" ");
        return normalizeText(haystack).indexOf(currentQuery) > -1;
      }

      function renderTabGuide() {
        tabGuide.textContent = tabGuideMap[currentFilter] || tabGuideMap["全部"];
      }

      function renderPosts() {
        var filtered = allPosts.filter(function (item) {
          var tags = normalizeTags(item);
          var inCategory = currentFilter === "全部" || item.category === currentFilter || tags.indexOf(currentFilter) > -1;
          return inCategory && matchesSearch(item);
        });

        if (!filtered.length) {
          list.innerHTML = [
            '<div class="col-span-full rounded-2xl border border-dashed border-slate-300 bg-white p-8 text-center">',
            '  <p class="text-base font-semibold text-slate-800">没有找到匹配内容</p>',
            '  <p class="mt-2 text-sm text-slate-500">试试更短的关键词，或切换分类后再搜。</p>',
            '</div>'
          ].join("");
          SiteCommon.initReveal(document);
          return;
        }

        list.innerHTML = filtered.map(function (item) {
          return [
            '<a target="_blank" rel="noopener" href="' + SiteCommon.resolvePath(item.url, "") + '" data-category="' + item.category + '" class="card-lift reveal rounded-2xl border border-slate-100 bg-white p-6">',
            '  <p class="text-xs font-semibold text-blue-600">' + item.category + '</p>',
            '  <h2 class="mt-2 text-xl font-semibold text-slate-900">' + item.title + '</h2>',
            '  <p class="mt-3 text-sm leading-relaxed text-slate-600">' + item.description + '</p>',
            '  <p class="mt-4 text-xs text-slate-400">发布日期：' + item.date + '</p>',
            '</a>'
          ].join("");
        }).join("");

        SiteCommon.initReveal(document);
      }

      filters.forEach(function (btn) {
          btn.addEventListener("click", function () {
            currentFilter = btn.getAttribute("data-filter");
            filters.forEach(function (x) { x.classList.remove("is-active"); });
            btn.classList.add("is-active");
            renderTabGuide();
            renderPosts();
          });
      });

      searchToggle.addEventListener("click", function () {
        var hidden = searchWrap.classList.contains("hidden");
        searchWrap.classList.toggle("hidden");
        searchToggle.setAttribute("aria-expanded", hidden ? "true" : "false");
        if (hidden) searchInput.focus();
        if (!hidden) {
          searchInput.value = "";
          currentQuery = "";
          renderPosts();
        }
      });

      searchInput.addEventListener("input", function () {
        currentQuery = normalizeText(searchInput.value).trim();
        renderPosts();
      });

      SiteCommon.fetchWithFallback("data/articles.json", "articles").then(function (posts) {
        allPosts = SiteCommon.uniqueByTitle(SiteCommon.sortByDateDesc(posts));
        var params = new URLSearchParams(window.location.search);
        var initTab = params.get("tab");
        if (initTab && tabGuideMap[initTab]) {
          currentFilter = initTab;
          filters.forEach(function (x) {
            x.classList.toggle("is-active", x.getAttribute("data-filter") === initTab);
          });
        }
        renderTabGuide();
        renderPosts();
      });

      SiteCommon.initReveal(document);
    })();
  </script>
</body>
